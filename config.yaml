app:
  check_interval: 60
  expiry_notice_minutes: 30
  name: Outlook 自动发送助手
error_handling:
  mark_failed_as: 发送失败
  notification:
    show_dialog: true
    sound_alert: true
  on_error:
    skip_and_continue: false
    stop_scheduler: true
excel:
  columns:
    attachments: 附件路径
    cc: 抄送
    last_sent_date: 最后发送日期
    planned_time: 计划发送时间
    recipient: 收件人
    schedule_params: 发送参数
    schedule_type: 发送方式
    send_mode: 发送模式
    sent_time: 实际发送时间
    status: 发送状态
    subject: 主题
    template: 使用模板
  main_file: data/emails.xlsx
  sheet_name: 邮件列表
logging:
  backup_count: 5
  file: logs/app.log
  level: INFO
  max_size_mb: 10
outlook:
  account: ''
  save_to_sent: true
send_mode_values:
  once: 一次性
  repeat: 重复
status_values:
  expired: 已过期
  failed: 发送失败
  pending: 待发送
  sent: 已发送
templates_file: templates.yaml
workdays:
  holidays:
  - '2026-01-01'
  - '2026-10-01'
  weekdays:
  - 1
  - 2
  - 3
  - 4
  - 5
